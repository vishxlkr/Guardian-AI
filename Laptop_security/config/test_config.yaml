app:
  log_level: INFO
  name: Personal Security Software
  version: 1.0.0
camera:
  device_id: 0
  fps: 30
  resolution:
    height: 480
    width: 640
face_recognition:
  model: hog
  tolerance: 0.6
intruder_monitor:
  capture_on_failed_login: true
  enabled: true
screen_guard:
  blur_settings:
    duration: 2
    opacity: 0.8
    padding: 60
    radius: 25
  check_interval: 0.5
  enabled: true
storage:
  authorized_faces_dir: data\images\authorized
  intruder_images_dir: data\images\intruders
  log_dir: data\logs
  retention_days: 30
